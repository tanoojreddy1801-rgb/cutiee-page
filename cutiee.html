<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Just One Question ❤️</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            height: 100vh;
            overflow: hidden;
        }

        .container {
            position: relative;
            text-align: center;
            top: 30%;
        }

        h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 40px;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            position: absolute;
            transition: all 0.2s ease;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            left: 40%;
        }

        #noBtn {
            background-color: #444;
            color: white;
            left: 55%;
        }

        #message {
            position: absolute;
            top: 65%;
            width: 100%;
            text-align: center;
            font-size: 24px;
            color: white;
            display: none;
        }
    </style>
</head>

<body>

<div class="container">
    <!-- 💡 CHANGE YOUR QUESTION HERE -->
    <h1> will you give me the desired photos??? 😙😙😙❤️</h1>
    <p> (i dare you to click no😙😙😙) </p>

    <button id="yesBtn">Yes 💖</button>
    <button id="noBtn">No 💔</button>

    <div id="message">I knew you'd say YES 😍❤️</div>
</div>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const message = document.getElementById("message");

    let yesScale = 1;

    // Move "No" button randomly when mouse gets close
    document.addEventListener("mousemove", (e) => {
        const rect = noBtn.getBoundingClientRect();

        const distance = Math.hypot(
            e.clientX - (rect.left + rect.width / 2),
            e.clientY - (rect.top + rect.height / 2)
        );

        if (distance < 120) {
            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;

            const randomX = Math.random() * maxX;
            const randomY = Math.random() * maxY;

            noBtn.style.left = randomX + "px";
            noBtn.style.top = randomY + "px";

            // Grow YES button every time she tries NO 😏
            yesScale += 0.1;
            yesBtn.style.transform = `scale(${yesScale})`;
        }
    });

    yesBtn.addEventListener("click", () => {
        message.style.display = "block";
    });
</script>

</body>
</html>
